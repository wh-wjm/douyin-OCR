name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            bundles: app
            artifact: douyin-ocr-macos-arm64-app-unsigned.zip
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
            artifact: douyin-ocr-windows-x64-setup-unsigned.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        run: bun run tauri build --target ${{ matrix.platform.target }} --bundles ${{ matrix.platform.bundles }}

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            app_path="$(find "src-tauri/target/${{ matrix.platform.target }}/release/bundle/macos" -maxdepth 1 -name "*.app" -type d -print -quit)"
            if [[ -z "$app_path" ]]; then
              echo "macOS app bundle not found"
              exit 1
            fi
            ditto -c -k --sequesterRsrc --keepParent "$app_path" "dist/${{ matrix.platform.artifact }}"
          else
            installer_path="$(find "src-tauri/target/${{ matrix.platform.target }}/release/bundle/nsis" -maxdepth 1 -name "*.exe" -type f -print -quit)"
            if [[ -z "$installer_path" ]]; then
              echo "Windows NSIS installer not found"
              exit 1
            fi
            cp "$installer_path" "dist/${{ matrix.platform.artifact }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.name }}
          path: dist/${{ matrix.platform.artifact }}

  publish:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          body: |
            本版本是基于 Tauri v2 的 2.0 桌面程序，包含未签名的 macOS 和 Windows 安装包。

            macOS 包内是 `抖音登记OCR.app`。由于未签名，首次打开可能需要在系统设置的“隐私与安全性”中手动允许运行。

            Windows 包是未签名 NSIS 安装器，可能会显示 SmartScreen 提醒。
